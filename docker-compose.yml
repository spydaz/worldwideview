services:
  wwv:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - wwv-data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      - "AUTH_SECRET=${AUTH_SECRET:-default_secret_for_local_dev}"
      - "WWV_DEMO_ADMIN_SECRET=${WWV_DEMO_ADMIN_SECRET:-}"
      - "WWV_BRIDGE_TOKEN=${WWV_BRIDGE_TOKEN:-}"
      - "DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/worldwideview?schema=public}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: worldwideview
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d worldwideview"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s
    profiles:
      - "${WWV_SKIP_LOCAL_DB:-}"

volumes:
  wwv-data:
  postgres-data:

networks:
  coolify:
    external: true
